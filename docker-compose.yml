services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  validator:
    build:
      context: .
      dockerfile: Dockerfile.validator
    ports:
      - "3001:3001"
    environment:
      VALIDATOR_SHARED_TOKEN: ${VALIDATOR_SHARED_TOKEN:-dev-token}
      PORT: "3001"
    # Validator must have NO database access, NO X/TG credentials
    # Only allowed to connect to public internet 80/443

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/compare
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-owner}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-CHANGE-ME-AT-FIRST-LOGIN}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-production}
      VALIDATOR_SHARED_TOKEN: ${VALIDATOR_SHARED_TOKEN:-dev-token}
      VALIDATOR_BASE_URL: http://validator:3001
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
    depends_on:
      postgres:
        condition: service_healthy
      validator:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/compare
      VALIDATOR_SHARED_TOKEN: ${VALIDATOR_SHARED_TOKEN:-dev-token}
      VALIDATOR_BASE_URL: http://validator:3001
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
    depends_on:
      postgres:
        condition: service_healthy
      validator:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
